services:
  - type: web
    name: cyber-sentinel-backend
    repo: https://github.com/Danish3803/Cyber_Sentinel_AI
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k gevent -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: pip
        value: pip
    autoDeploy: true
